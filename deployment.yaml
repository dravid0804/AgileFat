apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo01

spec:
  replicas: 2

  selector:
    matchLabels:
      app: html-demo01

  template:
    metadata:
      labels:
        app: html-demo01

    spec:
      containers:
        - name: html-demo01
          image: 23mis0036/html-demo01:latest
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service

spec:
  type: NodePort
  selector:
    app: html-demo

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30011
